server:
  port: 8080
  servlet:
    context-path: /api # sau 8080/api/...
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:labeling}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
    
jwt:
  signerKey: ${JWT_SIGNER_KEY:be4a8798222ebe35de31c52e483770c9efe2be0c2d0c9aa209ca48b27faf7d83}
  valid-duration: 1 # in hours
  refreshable-duration: 3 # in hours

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:djcvbbhup}
  api-key: ${CLOUDINARY_API_KEY:915878471116958}
  api-secret: ${CLOUDINARY_API_SECRET:Wo8Zrd_XgB-_5ZHj2fYQyXCzzns}

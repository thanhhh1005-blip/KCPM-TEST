services:
  beeshop-sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: beeshop-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "BeeShop@2026!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - beeshop_sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  beeshop_sql_data:

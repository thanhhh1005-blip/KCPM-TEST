<div class="min-h-screen flex flex-col relative">
  @if (!isAdminRoute()) {
    <app-header></app-header>
  }
  
  <main class="flex-grow" [class.pt-24]="!isHomePage() && !isAdminRoute()">
    <router-outlet></router-outlet>
  </main>

  @if (!isAdminRoute()) {
    <app-footer></app-footer>
    <app-floating-actions></app-floating-actions>
  }

  <!-- Toast Notification -->
  @if (toastVisible()) {
    <div class="fixed top-6 right-6 z-[9999] animate-slideIn max-w-sm"
         style="animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;">
      <div class="rounded-2xl shadow-2xl border p-5 flex items-start gap-4"
        [ngClass]="toastType() === 'success'
          ? 'bg-emerald-50 border-emerald-200 text-emerald-800'
          : 'bg-red-50 border-red-200 text-red-800'">
        <div class="w-10 h-10 rounded-full flex items-center justify-center text-xl flex-shrink-0"
          [ngClass]="toastType() === 'success' ? 'bg-emerald-100' : 'bg-red-100'">
          {{ toastType() === 'success' ? '🎉' : '❌' }}
        </div>
        <div class="flex-1">
          <p class="font-bold text-sm">{{ toastTitle() }}</p>
          <p class="text-xs mt-1 opacity-80">{{ toastMessage() }}</p>
        </div>
        <button (click)="dismissToast()" class="text-gray-400 hover:text-gray-600 transition-colors mt-0.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
    </div>
  }
</div>
